services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dsp-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - dsp-network
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: dsp-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - dsp-network
    depends_on:
      - app

  postgres:
    image: postgres:17
    container_name: dsp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: design_system
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    volumes:
      - dsp-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dsp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d design_system"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  dsp-network:
    driver: bridge

volumes:
  dsp-postgres-data:
    driver: local
